<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MagnetWonders</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(180deg, #fff7fb 0%, #fffaf0 50%, #fff 100%);
        color: #222;
        text-align: center;
        overflow-x: hidden;
    }

    /* HEADER */
    header {
        position: relative;
        padding: 70px 20px 50px;
        background: linear-gradient(135deg, #ff4f87, #ff7a59, #ffc857);
        overflow: hidden;
        border-bottom: 5px solid rgba(255,255,255,0.4);
        box-shadow: 0 10px 30px rgba(255, 90, 120, 0.25);
    }

    /* soft glowing bubbles */
    header::before,
    header::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: rgba(255,255,255,0.18);
        animation: bubbleFloat 10s infinite ease-in-out;
    }

    header::before {
        width: 180px;
        height: 180px;
        top: -50px;
        left: -40px;
    }

    header::after {
        width: 250px;
        height: 250px;
        bottom: -100px;
        right: -70px;
        animation-delay: 2s;
    }

    @keyframes bubbleFloat {
        0%   { transform: translateY(0px) scale(1); }
        50%  { transform: translateY(15px) scale(1.05); }
        100% { transform: translateY(0px) scale(1); }
    }

    /* MagnetWonders animated title */
    .brand-wrap {
        position: relative;
        width: 100%;
        overflow: hidden;
        margin-bottom: 16px;
    }

    .brand {
        display: inline-block;
        font-size: 4rem;
        font-weight: 900;
        letter-spacing: 1px;
        color: white;
        text-shadow:
            0 0 8px rgba(255,255,255,0.95),
            0 0 18px rgba(255,255,255,0.75),
            0 0 30px rgba(255, 230, 120, 0.6),
            0 0 45px rgba(255, 255, 255, 0.4);
        animation:
            swimX 6s ease-in-out infinite alternate,
            flashGlow 1.8s ease-in-out infinite;
        position: relative;
    }

    @keyframes swimX {
        0%   { transform: translateX(-60px) translateY(0px) rotate(-1deg); }
        25%  { transform: translateX(-20px) translateY(4px) rotate(1deg); }
        50%  { transform: translateX(20px) translateY(-2px) rotate(-1deg); }
        75%  { transform: translateX(45px) translateY(5px) rotate(1deg); }
        100% { transform: translateX(70px) translateY(0px) rotate(-1deg); }
    }

    @keyframes flashGlow {
        0%, 100% {
            text-shadow:
                0 0 8px rgba(255,255,255,0.95),
                0 0 18px rgba(255,255,255,0.75),
                0 0 30px rgba(255, 230, 120, 0.6),
                0 0 45px rgba(255,255,255,0.4);
        }
        50% {
            text-shadow:
                0 0 12px rgba(255,255,255,1),
                0 0 24px rgba(255,255,255,0.9),
                0 0 40px rgba(255, 239, 150, 0.9),
                0 0 65px rgba(255,255,255,0.6);
        }
    }

    .brand span {
        display: inline-block;
        margin-left: 10px;
        animation: iconBounce 2.5s ease-in-out infinite;
    }

    @keyframes iconBounce {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(4deg); }
    }

    .tagline {
        font-size: 1.35rem;
        color: white;
        font-weight: 500;
        text-shadow: 0 2px 8px rgba(0,0,0,0.18);
        opacity: 0.98;
    }

    /* HERO */
    .hero {
        max-width: 1150px;
        margin: 45px auto;
        padding: 20px;
    }

    .hero-card {
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(8px);
        border-radius: 24px;
        box-shadow: 0 18px 45px rgba(0,0,0,0.08);
        padding: 35px 25px;
        border: 1px solid rgba(255,255,255,0.65);
    }

    .hero-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 30px;
    }

    .hero-image {
        flex: 1 1 420px;
        min-width: 280px;
    }

    .hero-image img {
        width: 100%;
        max-width: 470px;
        border-radius: 22px;
        box-shadow: 0 16px 35px rgba(255, 92, 132, 0.18);
        object-fit: cover;
    }

    .hero-content {
        flex: 1 1 420px;
        min-width: 280px;
        text-align: left;
    }

    .hero-content h2 {
        font-size: 2.4rem;
        color: #222;
        margin-bottom: 16px;
        line-height: 1.2;
    }

    .hero-content p {
        font-size: 1.1rem;
        color: #555;
        margin-bottom: 24px;
        line-height: 1.7;
    }

    .highlight {
        color: #ff4f87;
        font-weight: 700;
    }

    /* BUTTONS */
    .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
    }

    .btn {
        display: inline-block;
        padding: 14px 22px;
        border-radius: 999px;
        text-decoration: none;
        color: white;
        font-weight: 700;
        font-size: 1rem;
        transition: 0.3s ease;
        box-shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    .btn:hover {
        transform: translateY(-4px) scale(1.03);
        box-shadow: 0 14px 30px rgba(0,0,0,0.16);
    }

    .btn-instagram {
        background: linear-gradient(135deg, #fd1d1d, #e1306c, #f77737);
    }

    .btn-whatsapp {
        background: linear-gradient(135deg, #25d366, #18a957);
    }

    /* FEATURES */
    .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
        margin-top: 30px;
    }

    .feature {
        background: linear-gradient(180deg, #fff, #fff9fb);
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 10px 24px rgba(0,0,0,0.06);
        border: 1px solid #ffe5ee;
    }

    .feature h3 {
        color: #ff4f87;
        margin-bottom: 8px;
        font-size: 1.1rem;
    }

    .feature p {
        color: #666;
        line-height: 1.6;
        font-size: 0.98rem;
    }

    /* PRICING */
    .pricing {
        max-width: 1100px;
        margin: 40px auto;
        padding: 10px 20px 30px;
    }

    .section-title {
        font-size: 2.2rem;
        margin-bottom: 20px;
        color: #222;
    }

    .pricing-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .card {
        background: linear-gradient(180deg, #ffffff, #fff7fb);
        border-radius: 22px;
        padding: 28px 20px;
        box-shadow: 0 14px 28px rgba(0,0,0,0.06);
        border: 1px solid #ffe0ea;
        transition: 0.3s ease;
    }

    .card:hover {
        transform: translateY(-8px);
        box-shadow: 0 18px 35px rgba(255, 105, 145, 0.14);
    }

    .card h3 {
        color: #ff4f87;
        margin-bottom: 10px;
        font-size: 1.25rem;
    }

    .card p {
        color: #555;
        font-size: 1.05rem;
    }

    /* GALLERY */
    .gallery-section {
        max-width: 1200px;
        margin: 30px auto 50px;
        padding: 0 20px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
    }

    .gallery img {
        width: 100%;
        height: 240px;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 12px 28px rgba(0,0,0,0.09);
        transition: 0.35s ease;
    }

    .gallery img:hover {
        transform: translateY(-6px) scale(1.03);
        box-shadow: 0 18px 35px rgba(255, 100, 145, 0.18);
    }

    /* FOOTER */
    footer {
        background: linear-gradient(135deg, #1d1d1d, #2c2c2c);
        color: #eee;
        padding: 35px 20px;
    }

    footer p {
        margin: 8px 0;
        color: #ddd;
    }

    footer a {
        color: #ffd86a;
        text-decoration: none;
        font-weight: 600;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .brand {
            font-size: 2.7rem;
        }

        .tagline {
            font-size: 1.05rem;
        }

        .hero-content {
            text-align: center;
        }

        .btn-group {
            justify-content: center;
        }

        .hero-content h2 {
            font-size: 2rem;
        }
    }
</style>
</head>
<body>

<header>
    <div class="brand-wrap">
        <div class="brand">MagnetWonders <span>🧲</span></div>
    </div>
    <p class="tagline">Turn Your Photos Into Beautiful Memories Forever</p>
</header>

<section class="hero">
    <div class="hero-card">
        <div class="hero-top">

            <div class="hero-image">
                <img src="https://images.unsplash.com/photo-1516542076529-1ea3854896f2?auto=format&fit=crop&w=900&q=80"
                     alt="Photo memories displayed beautifully" />
            </div>

            <div class="hero-content">
                <h2>Custom <span class="highlight">Photo Fridge Magnets</span> made with love in NZ</h2>
                <p>
                    Turn your favorite photos into charming custom magnets — perfect for birthdays,
                    family memories, anniversaries, gifts, and special moments that deserve to stay visible every day.
